<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0a0f;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #0a0a0f;
            overflow: hidden;
        }

        .bg-gradient::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.25) 0%, transparent 70%);
            top: -200px;
            left: -200px;
            animation: drift1 12s ease-in-out infinite alternate;
        }

        .bg-gradient::after {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.2) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            animation: drift2 15s ease-in-out infinite alternate;
        }

        .bg-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: drift3 10s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(80px, 60px) scale(1.15); }
        }
        @keyframes drift2 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(-60px, -80px) scale(1.1); }
        }
        @keyframes drift3 {
            from { transform: translate(-50%, -50%) scale(1); }
            to   { transform: translate(-50%, -50%) scale(1.2); }
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 60px 20px 80px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 52px;
        }

        .header .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #c4b5fd;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: clamp(36px, 6vw, 64px);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, #e879f9 40%, #818cf8 70%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .header p {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }

        /* Input area */
        .input-wrapper {
            width: 100%;
            max-width: 580px;
            margin-bottom: 48px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 8px;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s;
        }

        .input-group:focus-within {
            border-color: rgba(139, 92, 246, 0.6);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
        }

        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .generate-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.01em;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.5);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loading */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: #8b5cf6;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Error */
        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fca5a5;
            font-size: 14px;
            max-width: 580px;
            width: 100%;
            margin-bottom: 24px;
        }

        .error-message.show {
            display: block;
        }

        /* Result */
        .result-area {
            width: 100%;
            max-width: 680px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .result-area.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .card-wrapper {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 28px;
            backdrop-filter: blur(20px);
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 13px 20px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .action-btn.copy {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.8);
        }

        .action-btn.copy:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .action-btn.copy.copied {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.4);
            color: #86efac;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: #fff;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            .generate-btn { width: 100%; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient">
        <div class="bg-blob"></div>
    </div>

    <div class="page">
        <div class="header">
            <h1>GitHub Dev Card<br>Generator</h1>
            <p>Turn any GitHub profile into a beautiful dev card</p>
        </div>

        <div class="input-wrapper">
            <div class="input-group">
                <input
                    type="text"
                    id="usernameInput"
                    placeholder="Enter a GitHub username..."
                    autocomplete="off"
                >
                <button class="generate-btn" id="generateBtn">Generate ✦</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating your dev card...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-area" id="resultArea">
            <div class="card-wrapper" id="cardContainer"></div>
            <div class="actions">
                <button class="action-btn copy" id="shareBtn">📋 Copy Card Link</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        const usernameInput = document.getElementById('usernameInput');
        const generateBtn   = document.getElementById('generateBtn');
        const loading       = document.getElementById('loading');
        const errorMessage  = document.getElementById('errorMessage');
        const resultArea    = document.getElementById('resultArea');
        const cardContainer = document.getElementById('cardContainer');
        const shareBtn      = document.getElementById('shareBtn');
        const toast         = document.getElementById('toast');

        let cardUrl = '';

        // ⚠️ UPDATE THIS to your Railway backend URL
        const RAILWAY_BACKEND_URL = 'https://github-card-generator-production.up.railway.app';
        const BACKEND_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:8080'
            : RAILWAY_BACKEND_URL;
        const API_ENDPOINT = `${BACKEND_URL}/generate`;

        generateBtn.addEventListener('click', generateCard);
        usernameInput.addEventListener('keypress', e => { if (e.key === 'Enter') generateCard(); });

        async function generateCard() {
            const username = usernameInput.value.trim();
            if (!username) { showError('Please enter a GitHub username'); return; }

            showLoading();
            clearError();
            generateBtn.disabled = true;

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    showError(err.detail || `Error ${response.status}: ${response.statusText}`);
                    hideLoading();
                    generateBtn.disabled = false;
                    return;
                }

                const data = await response.json();
                const htmlCard = data.html || '';

                if (!htmlCard) {
                    showError('No card was generated. Try again.');
                    hideLoading();
                    generateBtn.disabled = false;
                    return;
                }

                cardContainer.innerHTML = htmlCard;
                resultArea.classList.add('show');
                cardUrl = `${BACKEND_URL}/static/cards/${username}.html`;

            } catch (err) {
                console.error(err);
                showError('Could not connect to the backend. Check your network or backend URL.');
            } finally {
                hideLoading();
                generateBtn.disabled = false;
            }
        }

        function showLoading()  { loading.classList.add('active'); resultArea.classList.remove('show'); }
        function hideLoading()  { loading.classList.remove('active'); }
        function showError(msg) { errorMessage.textContent = msg; errorMessage.classList.add('show'); }
        function clearError()   { errorMessage.classList.remove('show'); }

        shareBtn.addEventListener('click', () => {
            if (!cardUrl) return;
            navigator.clipboard.writeText(cardUrl).then(() => {
                shareBtn.classList.add('copied');
                shareBtn.textContent = '✓ Copied!';
                toast.classList.add('show');
                setTimeout(() => {
                    shareBtn.classList.remove('copied');
                    shareBtn.textContent = '📋 Copy Card Link';
                    toast.classList.remove('show');
                }, 2500);
            }).catch(() => showError('Failed to copy to clipboard'));
        });

        usernameInput.focus();
    </script>
</body>
</html>
